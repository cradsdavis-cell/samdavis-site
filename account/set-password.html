<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Set your password · crads-ai</title>
  <link rel="stylesheet" href="/lib/site.css">
  <meta name="robots" content="noindex">
  <!-- input styling comes from the unified .account-page form rules in lib/site.css -->
</head>
<body class="account-page">
  <main class="login-wrap">
    <div class="site-return"><a href="/" class="wordmark">crads-<span class="accent">ai</span></a></div>
    <h1 class="serif">Set your password</h1>
    <p class="subtitle">Choose a password (10+ characters). You'll be signed in straight after.</p>
    <form id="sp-form" class="lead-capture-card" autocomplete="on">
      <input type="password" name="password" id="sp-password" required minlength="10" placeholder="new password (10+ characters)" autocomplete="new-password">
      <input type="password" name="confirm" id="sp-confirm" required minlength="10" placeholder="confirm password" autocomplete="new-password">
      <button type="submit" class="cta">Set password &amp; sign in</button>
      <p class="status" id="sp-status" hidden></p>
    </form>
    <a href="/account/login" class="login-back">← Back to sign in</a>
  </main>

  <script>
    (function () {
      var form = document.getElementById('sp-form');
      var pwEl = document.getElementById('sp-password');
      var confirmEl = document.getElementById('sp-confirm');
      var status = document.getElementById('sp-status');
      var token = new URLSearchParams(location.search).get('token');

      function show(msg, isError) {
        status.hidden = false;
        status.textContent = msg;
        status.setAttribute('data-kind', isError ? 'error' : 'info');
      }

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        var password = pwEl.value;
        if (password.length < 10) { show('Password must be at least 10 characters.', true); return; }
        if (password !== confirmEl.value) { show('The two passwords don’t match.', true); return; }
        show('Saving…', false);
        var body = { password: password };
        if (token) body.token = token;
        var r = await fetch('/api/auth/set-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        var data = await r.json().catch(function () { return {}; });
        if (r.ok) {
          window.location.assign((data && data.redirect) || '/account/');
        } else if (r.status === 401) {
          show('This link has expired or you’re not signed in. Request a new link from the ' +
               'sign-in page (Forgot password?).', true);
        } else {
          show((data && data.message) || 'Couldn’t set your password. Try again.', true);
        }
      });
    })();
  </script>
</body>
</html>
